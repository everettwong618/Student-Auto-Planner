# Auto-Planner default settings — so the app always launches the same easy way.
[server]
port = 8600          # not 8501 (that port is in use on this machine)
address = "localhost" # computer-only testing by default
headless = true      # skip Streamlit's first-run email prompt
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#01696f"
backgroundColor = "#f7f6f2"
secondaryBackgroundColor = "#edeae5"
textColor = "#28251d"
font = "sans serif"
