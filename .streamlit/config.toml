# Auto-Planner default settings — so the app always launches the same easy way.
# NOTE: do NOT set server.port or server.address here.
# Streamlit Community Cloud requires its own port (8501) and will fail its health
# check if we override it. Local testing uses the launchers
# (Start Auto-Planner.bat / ...for iPhone.bat), which pass --server.port 8600 and
# the right --server.address on the command line instead.
[server]
headless = true      # skip Streamlit's first-run email prompt
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#01696f"
backgroundColor = "#f7f6f2"
secondaryBackgroundColor = "#edeae5"
textColor = "#28251d"
font = "sans serif"
